{{define "content"}}
<header class="page-header">
    <div>
        <a href="/customers/{{uuidStr .Customer.ID}}/assets/{{uuidStr .Asset.ID}}/bom">&larr; Back to BOM</a>
        <h1>{{if .IsNew}}New BOM Position{{else}}Edit BOM Position{{end}}</h1>
    </div>
</header>

<div class="card">
    <div id="form-message" aria-live="polite"></div>

    <form id="bom-form"
          data-url="{{if .IsNew}}/api/v1/assets/{{uuidStr .Asset.ID}}/bom{{else}}/api/v1/assets/{{uuidStr .Asset.ID}}/bom/{{uuidStr .Item.ID}}{{end}}"
          data-method="{{if .IsNew}}POST{{else}}PUT{{end}}"
          data-customer-id="{{uuidStr .Customer.ID}}"
          data-asset-id="{{uuidStr .Asset.ID}}">

        <div class="form-group">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" value="{{.Item.Name}}" required>
        </div>

        <div class="form-group">
            <label for="quantity">Quantity *</label>
            <input type="number" id="quantity" name="quantity"
                   value="{{numStr .Item.Quantity}}" step="0.0001" min="0" required>
        </div>

        <div class="form-group">
            <label for="unit_id">Unit *</label>
            <select id="unit_id" name="unit_id" required>
                <option value="">— Select unit —</option>
                {{range .Units}}
                <option value="{{uuidStr .ID}}"
                    {{if eq (uuidStr $.Item.UnitID) (uuidStr .ID)}}selected{{end}}>
                    {{.Name}}
                </option>
                {{end}}
            </select>
        </div>

        <div class="form-group">
            <label for="unit_price">Unit Price *</label>
            <input type="number" id="unit_price" name="unit_price"
                   value="{{numStr .Item.UnitPrice}}" step="0.0001" min="0" required>
        </div>

        <div class="form-group">
            <label for="currency">Currency *</label>
            <select id="currency" name="currency" required>
                {{$cur := .Item.Currency}}
                {{range $c := .Currencies}}
                <option value="{{$c}}"
                    {{if eq $cur $c}}selected{{end}}>
                    {{$c}}
                </option>
                {{end}}
            </select>
        </div>

        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" rows="3">{{pgText .Item.Notes}}</textarea>
        </div>

        <div class="flex gap-1">
            <button type="button" id="bom-submit" class="btn btn-primary">
                {{if .IsNew}}Create{{else}}Save{{end}}
            </button>
            <a href="/customers/{{uuidStr .Customer.ID}}/assets/{{uuidStr .Asset.ID}}/bom" class="btn">Cancel</a>
        </div>
    </form>
</div>

<script>
document.getElementById('bom-submit').addEventListener('click', function() {
    var form = document.getElementById('bom-form');
    var body = {
        name:       document.getElementById('name').value,
        quantity:   parseFloat(document.getElementById('quantity').value),
        unit_id:    document.getElementById('unit_id').value,
        unit_price: parseFloat(document.getElementById('unit_price').value),
        currency:   document.getElementById('currency').value,
        notes:      document.getElementById('notes').value || null
    };

    fetch(form.dataset.url, {
        method:  form.dataset.method,
        headers: {'Content-Type': 'application/json'},
        body:    JSON.stringify(body)
    }).then(function(resp) {
        return resp.json().then(function(data) { return {ok: resp.ok, data: data}; });
    }).then(function(result) {
        if (result.ok) {
            window.location.href = '/customers/' + form.dataset.customerId +
                '/assets/' + form.dataset.assetId + '/bom';
        } else {
            var msg = result.data.error || 'Error saving BOM position';
            document.getElementById('form-message').innerHTML =
                '<div class="alert alert-error" role="alert">' + msg + '</div>';
        }
    }).catch(function() {
        document.getElementById('form-message').innerHTML =
            '<div class="alert alert-error" role="alert">Error saving BOM position</div>';
    });
});
</script>
{{end}}
