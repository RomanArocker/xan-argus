{{define "content"}}
<header class="page-header">
    <h1>{{if .IsNew}}New Asset{{else}}Edit Asset{{end}} — {{.Customer.Name}}</h1>
</header>

<div class="card">
    <form id="asset-form"
          data-url="{{if .IsNew}}/api/v1/customers/{{uuidStr .Customer.ID}}/assets{{else}}/api/v1/assets/{{uuidStr .Asset.ID}}{{end}}"
          data-method="{{if .IsNew}}POST{{else}}PUT{{end}}"
          data-customer-id="{{uuidStr .Customer.ID}}"
          data-is-new="{{.IsNew}}"
          onsubmit="return false;">

        <div id="form-message" aria-live="polite"></div>

        <div class="form-group">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name"
                   value="{{if not .IsNew}}{{.Asset.Name}}{{end}}" required>
        </div>

        <div class="form-group">
            <label for="category_id">Category</label>
            <select id="category_id" name="category_id">
                <option value="">— No category —</option>
                {{range .Categories}}
                <option value="{{uuidStr .ID}}" {{if eq (uuidStr .ID) (uuidStr $.Asset.CategoryID)}}selected{{end}}>{{.Name}}</option>
                {{end}}
            </select>
        </div>

        <div id="category-fields">
            {{if .CategoryFields}}
                {{template "category_fields" .CategoryFields}}
            {{end}}
        </div>

        <div class="form-group">
            <label for="user_assignment_id">Assigned to</label>
            <select id="user_assignment_id" name="user_assignment_id">
                <option value="">— Not assigned —</option>
                {{range .UserAssignments}}
                <option value="{{uuidStr .ID}}" {{if eq (uuidStr .ID) (uuidStr $.Asset.UserAssignmentID)}}selected{{end}}>{{.DisplayName}}</option>
                {{end}}
            </select>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description">{{if not .IsNew}}{{pgText .Asset.Description}}{{end}}</textarea>
        </div>

        <div class="flex gap-1">
            <button type="submit" class="btn btn-primary">{{if .IsNew}}Create{{else}}Save{{end}}</button>
            <a href="/customers/{{uuidStr .Customer.ID}}" class="btn">Cancel</a>
        </div>
    </form>
</div>

<script>
    // Load category fields via htmx.ajax when category changes
    var categorySelect = document.getElementById('category_id');
    categorySelect.addEventListener('change', function() {
        var catId = categorySelect.value;
        if (catId) {
            var assetId = '{{if not .IsNew}}{{uuidStr .Asset.ID}}{{end}}';
            var url = '/categories/' + catId + '/fields';
            if (assetId) url += '?asset_id=' + assetId;
            htmx.ajax('GET', url, {target: '#category-fields', swap: 'innerHTML'});
        } else {
            document.getElementById('category-fields').innerHTML = '';
        }
    });

    // Submit form via fetch to support nested field_values JSON
    var form = document.getElementById('asset-form');
    form.querySelector('button[type="submit"]').addEventListener('click', function() {
        var body = {name: document.getElementById('name').value};
        var desc = document.getElementById('description').value;
        if (desc) body.description = desc;
        if (categorySelect.value) body.category_id = categorySelect.value;
        var assignSelect = document.getElementById('user_assignment_id');
        if (assignSelect.value) body.user_assignment_id = assignSelect.value;

        // Collect category field values
        var fieldInputs = document.querySelectorAll('[data-field-id]');
        if (fieldInputs.length > 0) {
            var fieldValues = {};
            fieldInputs.forEach(function(input) {
                var id = input.dataset.fieldId;
                var type = input.dataset.fieldType;
                if (type === 'boolean') {
                    fieldValues[id] = input.checked;
                } else if (type === 'number') {
                    fieldValues[id] = input.value ? parseFloat(input.value) : null;
                } else {
                    fieldValues[id] = input.value || null;
                }
            });
            body.field_values = fieldValues;
        }

        fetch(form.dataset.url, {
            method: form.dataset.method,
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        }).then(function(resp) {
            return resp.json().then(function(data) { return {ok: resp.ok, data: data}; });
        }).then(function(result) {
            if (result.ok && result.data.id) {
                window.location.href = '/customers/' + form.dataset.customerId + '/assets/' + result.data.id;
            } else {
                var msg = result.data.error || 'Error saving asset';
                document.getElementById('form-message').innerHTML =
                    '<div class="alert alert-error" role="alert">' + msg + '</div>';
            }
        }).catch(function() {
            document.getElementById('form-message').innerHTML =
                '<div class="alert alert-error" role="alert">Error saving asset</div>';
        });
    });
</script>
{{end}}
