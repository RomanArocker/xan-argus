{{define "service_rows"}}
{{range .}}
<tr>
    <td>{{.Name}}</td>
    <td>{{pgText .Description}}</td>
    <td>{{formatDateTime .CreatedAt}}</td>
    <td class="text-right">
        <a href="/services/{{uuidStr .ID}}/edit" class="btn btn-sm">Edit</a>
        <button class="btn btn-danger btn-sm" hx-delete="/api/v1/services/{{uuidStr .ID}}"
                hx-confirm="Delete service '{{.Name}}'?"
                hx-target="closest tr" hx-swap="outerHTML swap:0.3s">Delete</button>
    </td>
</tr>
{{else}}<tr><td colspan="4" class="text-muted">No services found.</td></tr>{{end}}
{{end}}
