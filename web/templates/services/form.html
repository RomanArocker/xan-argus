{{define "content"}}
<div class="page-header">
    <h1>{{if .IsNew}}New Service{{else}}Edit Service{{end}}</h1>
</div>
<div class="card">
    <form id="service-form"
          {{if .IsNew}}hx-post="/api/v1/services"{{else}}hx-put="/api/v1/services/{{uuidStr .Service.ID}}"{{end}}
          hx-ext="json-enc" hx-target="#form-message" hx-swap="innerHTML">
        <div id="form-message"></div>
        <div class="form-group">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" value="{{if not .IsNew}}{{.Service.Name}}{{end}}" required>
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description">{{if not .IsNew}}{{pgText .Service.Description}}{{end}}</textarea>
        </div>
        <div class="flex gap-1">
            <button type="submit" class="btn btn-primary">{{if .IsNew}}Create{{else}}Save{{end}}</button>
            <a href="/services" class="btn">Cancel</a>
        </div>
    </form>
</div>
<script>
    document.body.addEventListener('htmx:afterRequest', function(evt) {
        if (evt.detail.elt.id === 'service-form' && evt.detail.successful) { window.location.href = '/services'; }
    });
    document.body.addEventListener('htmx:responseError', function(evt) {
        if (evt.detail.elt.id === 'service-form') {
            var msg = 'Error saving';
            try { msg = JSON.parse(evt.detail.xhr.responseText).error || msg; } catch(e) {}
            document.getElementById('form-message').innerHTML = '<div class="alert alert-error">' + msg + '</div>';
        }
    });
</script>
{{end}}
