{{define "content"}}
<header class="page-header">
    <h1>Customers</h1>
    <div class="flex gap-1">
        <a href="/api/v1/export/customers" class="btn btn-sm">Export CSV</a>
        <a href="/customers/new" class="btn btn-primary">+ New Customer</a>
    </div>
</header>
<search class="search-bar">
    <input type="search" name="q" placeholder="Search customers..."
           hx-get="/customers/rows"
           hx-trigger="keyup changed delay:300ms"
           hx-target="#customer-rows"
           value="{{.Search}}">
</search>
<div class="card">
    <table>
        <thead><tr><th>Name</th><th>Email</th><th>Created</th><th></th></tr></thead>
        <tbody id="customer-rows">
            {{template "customer_rows" .Customers}}
        </tbody>
    </table>
</div>
{{end}}
