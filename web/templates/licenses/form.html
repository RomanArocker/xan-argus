{{define "content"}}
<header class="page-header">
    <h1>{{if .IsNew}}New License{{else}}Edit License{{end}} — {{.Customer.Name}}</h1>
</header>

<div class="card">
    <form id="license-form"
          data-url="{{if .IsNew}}/api/v1/customers/{{uuidStr .Customer.ID}}/licenses{{else}}/api/v1/licenses/{{uuidStr .License.ID}}{{end}}"
          data-method="{{if .IsNew}}POST{{else}}PUT{{end}}"
          data-customer-id="{{uuidStr .Customer.ID}}"
          onsubmit="return false;">

        <div id="form-message" aria-live="polite"></div>

        <div class="form-group">
            <label for="product_name">Product Name *</label>
            <input type="text" id="product_name" name="product_name"
                   value="{{if not .IsNew}}{{.License.ProductName}}{{end}}" required>
        </div>

        <div class="form-group">
            <label for="license_key">License Key</label>
            <input type="text" id="license_key" name="license_key"
                   value="{{if not .IsNew}}{{pgText .License.LicenseKey}}{{end}}">
        </div>

        <div class="form-group">
            <label for="quantity">Quantity *</label>
            <input type="number" id="quantity" name="quantity" min="1"
                   value="{{if .IsNew}}1{{else}}{{.License.Quantity}}{{end}}" required>
        </div>

        <div class="form-group">
            <label for="valid_from">Valid From</label>
            <input type="date" id="valid_from" name="valid_from"
                   value="{{if not .IsNew}}{{formatInputDate .License.ValidFrom}}{{end}}">
        </div>

        <div class="form-group">
            <label for="valid_until">Valid Until</label>
            <input type="date" id="valid_until" name="valid_until"
                   value="{{if not .IsNew}}{{formatInputDate .License.ValidUntil}}{{end}}">
        </div>

        <div class="form-group">
            <label for="user_assignment_id">Assigned to</label>
            <select id="user_assignment_id" name="user_assignment_id">
                <option value="">— Not assigned —</option>
                {{range .UserAssignments}}
                <option value="{{uuidStr .ID}}" {{if eq (uuidStr .ID) (uuidStr $.License.UserAssignmentID)}}selected{{end}}>{{.DisplayName}}</option>
                {{end}}
            </select>
        </div>

        <div class="flex gap-1">
            <button type="submit" class="btn btn-primary">{{if .IsNew}}Create{{else}}Save{{end}}</button>
            <a href="/customers/{{uuidStr .Customer.ID}}" class="btn">Cancel</a>
        </div>
    </form>
</div>

<script>
    var form = document.getElementById('license-form');
    form.querySelector('button[type="submit"]').addEventListener('click', function() {
        var body = {
            product_name: document.getElementById('product_name').value,
            quantity: parseInt(document.getElementById('quantity').value) || 1,
            license_key: document.getElementById('license_key').value || null,
            valid_from: document.getElementById('valid_from').value || null,
            valid_until: document.getElementById('valid_until').value || null,
            user_assignment_id: document.getElementById('user_assignment_id').value || null
        };

        fetch(form.dataset.url, {
            method: form.dataset.method,
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        }).then(function(resp) {
            return resp.json().then(function(data) { return {ok: resp.ok, data: data}; });
        }).then(function(result) {
            if (result.ok && result.data.id) {
                window.location.href = '/customers/' + form.dataset.customerId + '/licenses/' + result.data.id;
            } else {
                var msg = result.data.error || 'Error saving';
                document.getElementById('form-message').innerHTML =
                    '<div class="alert alert-error" role="alert">' + msg + '</div>';
            }
        }).catch(function() {
            document.getElementById('form-message').innerHTML =
                '<div class="alert alert-error" role="alert">Error saving</div>';
        });
    });
</script>
{{end}}
